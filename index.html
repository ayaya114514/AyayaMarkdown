<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyayaMarkdown</title>
  <meta name="description" content="一个支持代码高亮、Mermaid 图表与 LaTeX 公式的在线 Markdown 编辑器。" />
  <!-- 内联 SVG favicon：避免对 /favicon.ico 的 404 请求 -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237ee787' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/%3E%3Cpolyline points='14 2 14 8 20 8'/%3E%3Cpath d='M9 18 L12 11 L15 18 M10.2 15.5 L13.8 15.5'/%3E%3C/svg%3E" />

  <!-- 字体：界面用 Inter，代码用 JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CodeMirror 5：编辑器 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.min.css" />

  <!-- highlight.js：代码块高亮（预览区） -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
  />

  <!-- KaTeX：LaTeX 数学公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="icon-btn" id="btn-sidebar-toggle" title="隐藏侧边栏" aria-label="隐藏侧边栏" aria-expanded="true">
        <svg class="icon-sidebar-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <line x1="9" y1="4" x2="9" y2="20" />
          <polyline points="15 9 12 12 15 15" />
        </svg>
        <svg class="icon-sidebar-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <line x1="9" y1="4" x2="9" y2="20" />
          <polyline points="12 9 15 12 12 15" />
        </svg>
      </button>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <path d="M9 18 L12 11 L15 18 M10.2 15.5 L13.8 15.5" />
        </svg>
        <span class="logo-text">AyayaMarkdown</span>
      </div>
    </div>

    <div class="toolbar-center">
      <button class="btn" id="btn-new" title="新建文档 (Ctrl+N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="12" y1="18" x2="12" y2="12" />
          <line x1="9" y1="15" x2="15" y2="15" />
        </svg>
        <span>新建</span>
      </button>

      <button class="btn" id="btn-open" title="打开本地 .md 文件 (Ctrl+O)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span>上传</span>
      </button>
      <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden />

      <div class="divider"></div>

      <button class="btn" id="btn-export-md" title="导出为 Markdown 文件 (Ctrl+S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        <span>导出 MD</span>
      </button>

      <button class="btn" id="btn-export-html" title="导出为 HTML 文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        <span>导出 HTML</span>
      </button>

      <button class="btn" id="btn-export-pdf" title="导出为 PDF（通过浏览器打印）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="9" y1="14" x2="15" y2="14" />
          <line x1="9" y1="17" x2="13" y2="17" />
        </svg>
        <span>导出 PDF</span>
      </button>
    </div>

    <div class="toolbar-right">
      <a class="icon-btn" href="https://github.com" target="_blank" rel="noopener noreferrer" title="GitHub 源码" id="btn-github">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56v-2.01c-3.2.69-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.05 11.05 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.59.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.42-2.7 5.39-5.27 5.68.41.36.78 1.06.78 2.13v3.16c0 .31.21.67.8.56C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z" />
        </svg>
      </a>
    </div>
  </header>

  <!-- 主体：文档列表 / 左编辑 / 分割线 / 右预览 -->
  <main class="workspace">
    <aside class="document-sidebar" aria-label="文档列表">
      <div class="document-sidebar-header">
        <div>
          <div class="document-sidebar-title">文档</div>
          <div class="document-sidebar-subtitle"><span id="doc-count">0</span> 个文档</div>
        </div>
        <div class="document-actions">
          <button class="icon-btn document-action" id="btn-new-sidebar" title="新建文档">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="12" y1="18" x2="12" y2="12" />
              <line x1="9" y1="15" x2="15" y2="15" />
            </svg>
          </button>
          <button class="icon-btn document-action" id="btn-open-sidebar" title="上传文档">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </button>
        </div>
      </div>
      <div class="document-list" id="document-list" role="listbox" aria-label="已保存文档"></div>
      <div class="document-sidebar-resizer" id="document-sidebar-resizer" title="拖动调整侧边栏宽度"></div>
    </aside>

    <section class="pane pane-editor">
      <div class="pane-header">
        <div class="pane-title">
          <span class="dot dot-edit"></span>
          编辑
        </div>
        <div class="editor-toolbar" role="toolbar" aria-label="格式化工具栏">
          <button class="editor-tool-btn" data-md-action="undo" title="撤销 (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7v6h6" />
              <path d="M21 17a9 9 0 0 0-15-6.7L3 13" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="redo" title="重做 (Ctrl+Shift+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 7v6h-6" />
              <path d="M3 17a9 9 0 0 1 15-6.7L21 13" />
            </svg>
          </button>
          <span class="editor-tool-divider"></span>
          <button class="editor-tool-btn editor-tool-text" data-md-action="h1" title="一级标题">H1</button>
          <button class="editor-tool-btn editor-tool-text" data-md-action="h2" title="二级标题">H2</button>
          <button class="editor-tool-btn editor-tool-text" data-md-action="h3" title="三级标题">H3</button>
          <span class="editor-tool-divider"></span>
          <button class="editor-tool-btn editor-tool-text editor-tool-bold" data-md-action="bold" title="粗体">B</button>
          <button class="editor-tool-btn editor-tool-text editor-tool-italic" data-md-action="italic" title="斜体">I</button>
          <button class="editor-tool-btn editor-tool-text editor-tool-strike" data-md-action="strike" title="删除线">S</button>
          <button class="editor-tool-btn" data-md-action="code" title="行内代码">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
          </button>
          <span class="editor-tool-divider"></span>
          <button class="editor-tool-btn" data-md-action="link" title="链接">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="image" title="图片">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
          </button>
          <span class="editor-tool-divider"></span>
          <button class="editor-tool-btn" data-md-action="quote" title="引用">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7h6v6c0 3-2 5-5 5" />
              <path d="M14 7h6v6c0 3-2 5-5 5" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="ul" title="无序列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <circle cx="4" cy="6" r="1" />
              <circle cx="4" cy="12" r="1" />
              <circle cx="4" cy="18" r="1" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="ol" title="有序列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="10" y1="6" x2="21" y2="6" />
              <line x1="10" y1="12" x2="21" y2="12" />
              <line x1="10" y1="18" x2="21" y2="18" />
              <path d="M4 6h1v4" />
              <path d="M4 10h2" />
              <path d="M6 18H4c0-1 2-1.5 2-2.5S5 14 4 14.5" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="task" title="任务列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <polyline points="8 12 11 15 16 9" />
            </svg>
          </button>
          <span class="editor-tool-divider"></span>
          <button class="editor-tool-btn" data-md-action="codeblock" title="代码块">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2" />
              <polyline points="9 10 7 12 9 14" />
              <polyline points="15 10 17 12 15 14" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="table" title="表格">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <line x1="3" y1="9" x2="21" y2="9" />
              <line x1="3" y1="15" x2="21" y2="15" />
              <line x1="12" y1="3" x2="12" y2="21" />
            </svg>
          </button>
          <button class="editor-tool-btn" data-md-action="hr" title="分隔线">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="12" x2="20" y2="12" />
            </svg>
          </button>
          <!-- 溢出折叠：宽度不足时把放不下的按钮收进这个下拉里 -->
          <div class="editor-tool-more-wrap" data-overflow-hidden>
            <button class="editor-tool-btn editor-tool-more" id="btn-toolbar-more" type="button" title="更多" aria-haspopup="true" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="5" cy="12" r="1.6" />
                <circle cx="12" cy="12" r="1.6" />
                <circle cx="19" cy="12" r="1.6" />
              </svg>
            </button>
            <div class="editor-tool-popup" id="editor-tool-popup" role="menu" hidden></div>
          </div>
        </div>
      </div>
      <div class="pane-body">
        <textarea id="editor"></textarea>
      </div>
    </section>

    <div class="splitter" id="splitter" title="拖动调整宽度">
      <div class="splitter-handle"></div>
    </div>

    <section class="pane pane-preview">
      <div class="pane-header">
        <div class="pane-title">
          <span class="dot dot-preview"></span>
          预览
        </div>
      </div>
      <div class="pane-body">
        <article id="preview" class="markdown-body"></article>
      </div>
      <!-- 跳转后返回按钮：点击 TOC 锚点链接后浮现，点击恢复到跳转前的位置 -->
      <button id="btn-jump-back" class="jump-back-btn" type="button" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 14l-4-4 4-4" />
          <path d="M5 10h11a4 4 0 0 1 0 8h-3" />
        </svg>
        <span>返回</span>
      </button>
    </section>
  </main>

  <!-- 底部状态栏 -->
  <footer class="statusbar">
    <div class="status-left">
      <span class="status-item">
        <strong id="stat-words">0</strong>
        <span>单词</span>
      </span>
      <span class="status-item">
        <strong id="stat-chars">0</strong>
        <span>字符</span>
      </span>
      <span class="status-item">
        <strong id="stat-lines">0</strong>
        <span>行</span>
      </span>
    </div>
  </footer>

  <!-- Toast 提示容器 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- 第三方依赖（顺序很重要） -->
  <!-- marked：markdown -> html -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <!-- highlight.js：代码高亮（注意必须用浏览器 UMD 版，不能用 npm 的 lib/*.js） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- KaTeX：公式渲染 -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid：图表 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <!-- CodeMirror 编辑器 -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/mode/overlay.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/gfm/gfm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/continuelist.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/display/placeholder.min.js"></script>

  <script src="app.js?v=20"></script>
</body>
</html>
